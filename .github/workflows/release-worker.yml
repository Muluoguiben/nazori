name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
        working-directory: worker
      - name: Deploy with Wrangler
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Smoke test
        run: |
          sleep 5
          curl -sf https://nazori-worker.$(echo ${{ github.repository_owner }}).workers.dev/health || echo "Smoke test endpoint not reachable — verify URL manually"
