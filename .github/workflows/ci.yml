name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            extension/package-lock.json
            worker/package-lock.json
      - run: npm ci
        working-directory: extension
      - run: npm ci
        working-directory: worker
      - run: npx tsc --noEmit
        working-directory: extension
      - run: npx tsc --noEmit
        working-directory: worker

  test-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
        working-directory: extension
      - run: npm test
        working-directory: extension

  test-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
        working-directory: worker
      - run: npm test
        working-directory: worker

  build:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
        working-directory: extension
      - run: npm run build
        working-directory: extension
      - uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist/
